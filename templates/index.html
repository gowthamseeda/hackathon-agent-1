<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Feedback Agent | AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A73E8;
            --bg: #F8FAFC;
            --chat-bg: #FFFFFF;
            --user-bubble: #1A73E8;
            --ai-bubble: #F1F5F9;
            --text-main: #1E293B;
            --text-bubble-user: #FFFFFF;
            --text-bubble-ai: #334155;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Area */
        header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .logo-area h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: #E8F0FE;
            color: var(--primary);
            border-radius: 20px;
            font-weight: 500;
        }

        /* Chat History */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #F8FAFC;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: var(--text-bubble-user);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--text-bubble-ai);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .ai-report-title {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--primary);
        }

        /* Input Area */
        .input-container {
            background: white;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            min-height: 48px;
            max-height: 150px;
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            background: white;
        }

        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        #send-btn:hover {
            background: #1557b0;
            transform: scale(1.05);
        }

        #send-btn:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
        }

        /* Loading Indicator */
        .typing {
            display: none;
            align-self: flex-start;
            background: var(--ai-bubble);
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94A3B8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>Gemini Agent</h1>
        </div>
        <div class="status-badge">ADK 1.0 Active</div>
    </header>

    <div id="chat-window">
        <div class="message ai">
            Hello! I am your Customer Feedback Intelligence Assistant. Paste a review below, and I'll analyze it for you.
        </div>
    </div>

    <div id="typing-indicator" class="typing">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="input-container">
        <textarea id="user-input" placeholder="Enter feedback review..." rows="1" oninput="autoHeight(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('send-btn');

        function autoHeight(elem) {
            elem.style.height = '48px';
            elem.style.height = (elem.scrollHeight) + 'px';
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = '48px';
            
            // Show Typing
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review: text })
                });

                const data = await response.json();
                
                if (response.ok) {
                    addMessage(data.response, 'ai', true);
                } else {
                    addMessage("Sorry, I encountered an error during analysis.", 'ai');
                }
            } catch (error) {
                addMessage("I couldn't reach the server. Please check your connection.", 'ai');
            } finally {
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function addMessage(text, sender, isReport = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            if (isReport) {
                div.innerHTML = `<div class="ai-report-title">Intelligence Report</div>${text.replace(/\n/g, '<br>')}`;
            } else {
                div.innerText = text;
            }
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
